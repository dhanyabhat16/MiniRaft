version: "3.9"

networks:
  raft-net:
    driver: bridge

services:

  gateway:
    build: ./gateway
    ports:
      - "4000:4000"
    environment:
      - PORT=4000
      - REPLICA1_URL=http://replica1:3001
      - REPLICA2_URL=http://replica2:3002
      - REPLICA3_URL=http://replica3:3003
    networks:
      - raft-net
    depends_on:
      - replica1
      - replica2
      - replica3

  replica1:
    build: ./replica
    volumes:
      - ./replica:/app          # bind mount — edit files → auto-reload
    ports:
      - "3001:3001"
    environment:
      - REPLICA_ID=replica1
      - PORT=3001
      - PEERS=http://replica2:3002,http://replica3:3003
    networks:
      - raft-net

  replica2:
    build: ./replica
    volumes:
      - ./replica:/app
    ports:
      - "3002:3002"
    environment:
      - REPLICA_ID=replica2
      - PORT=3002
      - PEERS=http://replica1:3001,http://replica3:3003
    networks:
      - raft-net

  replica3:
    build: ./replica
    volumes:
      - ./replica:/app
    ports:
      - "3003:3003"
    environment:
      - REPLICA_ID=replica3
      - PORT=3003
      - PEERS=http://replica1:3001,http://replica2:3002
    networks:
      - raft-net